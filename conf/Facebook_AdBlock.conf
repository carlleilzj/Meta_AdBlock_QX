# Facebook 去广告 - Quantumult X（加强版）
# https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Facebook_AdBlock.conf

[rewrite_local]
# GraphQL 信息流
^https?:\/\/(graph|b-graph|gateway|z-m-graph|graph-fallback)\.facebook\.com\/(graphql|v\d+\.\d+\/(graphql|.*)) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www|web|m|mbasic)\.facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www|web|m)\.facebook\.com\/api\/graphqlbatch\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js

# 部分 feed REST
^https?:\/\/(graph|b-graph)\.facebook\.com\/(me\/|v\d+\.\d+\/).*(feed|posts|notifications) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js

# 广告 / 追踪
^https?:\/\/an\.facebook\.com\/ url reject-dict
^https?:\/\/ads\.(facebook|meta)\.com\/ url reject-dict
^https?:\/\/(www\.)?facebook\.com\/tr\/? url reject-200
^https?:\/\/pixel\.(facebook|meta)\.com\/ url reject-200
^https?:\/\/graph\.facebook\.com\/network_ads_common\/ url reject-dict
^https?:\/\/(www\.)?facebook\.com\/(ads|adnw|ajax\/bz)\/ url reject-dict
^https?:\/\/atdmt\.com\/ url reject-dict
^https?:\/\/.*\.facebook\.com\/.*adnw_request url reject-dict

[mitm]
hostname = graph.facebook.com, b-graph.facebook.com, gateway.facebook.com, z-m-graph.facebook.com, graph-fallback.facebook.com, www.facebook.com, web.facebook.com, m.facebook.com, facebook.com, an.facebook.com, ads.facebook.com, pixel.facebook.com, *.facebook.com
