# Facebook 去广告 - Quantumult X
# raw: https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Facebook_AdBlock.conf
#
# 使用:
# 1. 开启 HTTPS 解密 / MITM，信任证书
# 2. 并入 [rewrite_local] / [mitm]
# 3. 若完全抓不到包，多半是证书锁定，请看 README 说明

[rewrite_local]
# —— GraphQL / 信息流响应过滤 ——
^https?:\/\/(graph|b-graph|gateway)\.facebook\.com\/(graphql|v\d+\.\d+\/graphql) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www\.)?facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/web\.facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js

# Feed / 通知等
^https?:\/\/(graph|b-graph)\.facebook\.com\/(me\/|v\d+\.\d+\/).*(feed|notifications) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js

# —— 广告 / 追踪域名与接口（无需解析 body）——
^https?:\/\/an\.facebook\.com\/ url reject-dict
^https?:\/\/ads\.(facebook|meta)\.com\/ url reject-dict
^https?:\/\/(www\.)?facebook\.com\/tr\/?\? url reject-200
^https?:\/\/(www\.)?facebook\.com\/(ads|adnw|advertising|ajax\/bz)\/ url reject-dict
^https?:\/\/pixel\.(facebook|meta)\.com\/ url reject-200
^https?:\/\/.*\.facebook\.com\/.*(\/ads\/|adnw_request|ad_network|sponsored_ad) url reject-dict
^https?:\/\/graph\.facebook\.com\/network_ads_common\/ url reject-dict
^https?:\/\/graph\.facebook\.com\/.*\/ads(_experience|_manager|_research)? url reject-dict
^https?:\/\/\.facebookma\.cn\/ url reject-dict
^https?:\/\/atdmt\.com\/ url reject-dict
^https?:\/\/staticxx\.facebook\.com\/ url reject-dict

[mitm]
hostname = graph.facebook.com, b-graph.facebook.com, gateway.facebook.com, www.facebook.com, web.facebook.com, facebook.com, an.facebook.com, ads.facebook.com, pixel.facebook.com, m.facebook.com
