# Instagram 去广告 - Quantumult X
# raw: https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Instagram_AdBlock.conf
#
# 使用:
# 1. 开启 HTTPS 解密 / MITM，信任证书
# 2. 将本文件 [rewrite_local] / [mitm] 并入配置，或添加远程 rewrite 资源
# 3. 重启 Instagram，下拉刷新信息流

[rewrite_local]
# —— 接口响应过滤（核心）——
# 首页时间线
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/timeline\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# Stories / 快拍托盘
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/reels_tray\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# 用户 Stories
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/user\/\d+\/story\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/reels_media\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# 探索 / 发现
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/discover\/(topical_explore|explore_grid|ayml)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/fbsearch\/(account_serp|recent_searches) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# Reels / Clips
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/clips\/(discover|home|stream|items)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/(reels_media|mixed_reels)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# 推荐 / 广告相关接口直接拒绝
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/(ads|advertising|ad_|loom_fetch|graph_ad) url reject-dict
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/(injected|ad_) url reject-dict
^https?:\/\/graph\.instagram\.com\/logging_client_events url reject-200

# GraphQL 网页/混合
^https?:\/\/(www\.)?instagram\.com\/(graphql\/query|api\/graphql) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/graphql(_www)? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# 部分广告资源
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/(ads|advertising)\/ url reject-dict

[mitm]
hostname = i.instagram.com, b.instagram.com, graph.instagram.com, www.instagram.com, instagram.com
