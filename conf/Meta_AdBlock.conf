# Instagram + Facebook 去广告（合并·加强版）
# https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Meta_AdBlock.conf
#
# ⚠️ 重要: 官方 IG/FB App 普遍有 SSL Pinning。
# 若最近请求里出现 gateway/i/graph 红锁、N/A、0B、App 空白：
#   请立刻改用兼容模式（不对 App API 做 MITM）:
#   https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Meta_AdBlock_Compat.conf
#
# 本文件适合: Safari 网页 或 已解决证书锁定的环境。

[rewrite_local]
# ===== Instagram =====
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/feed\/timeline\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/feed\/(reels_tray|reels_media|mixed_reels)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/feed\/user\/[^/]+\/story\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/clips\/(discover|home|stream|items|connected)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/discover\/(topical_explore|explore_grid|ayml|sectioned_explore)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/([a-z]+\.)?(i|b\.i)\.instagram\.com\/api\/v\d+\/(ads|advertising|ad_|loom_fetch_media|graph_ad) url reject-dict
^https?:\/\/([a-z]+\.)?(i|b\.i|graph)\.instagram\.com\/graphql(_www)?\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(www\.)?instagram\.com\/(graphql\/query|api\/graphql)\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(www\.)?instagram\.com\/api\/v1\/(feed|discover|clips)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# ===== Facebook =====
^https?:\/\/(graph|b-graph|gateway|z-m-graph|graph-fallback)\.facebook\.com\/(graphql|v\d+\.\d+\/(graphql|.*)) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www|web|m|mbasic)\.facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www|web|m)\.facebook\.com\/api\/graphqlbatch\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/an\.facebook\.com\/ url reject-dict
^https?:\/\/ads\.(facebook|meta)\.com\/ url reject-dict
^https?:\/\/(www\.)?facebook\.com\/tr\/? url reject-200
^https?:\/\/pixel\.(facebook|meta)\.com\/ url reject-200
^https?:\/\/graph\.facebook\.com\/network_ads_common\/ url reject-dict

[mitm]
hostname = i.instagram.com, b.i.instagram.com, b.instagram.com, graph.instagram.com, www.instagram.com, instagram.com, *.i.instagram.com, graph.facebook.com, b-graph.facebook.com, gateway.facebook.com, z-m-graph.facebook.com, graph-fallback.facebook.com, www.facebook.com, web.facebook.com, m.facebook.com, facebook.com, an.facebook.com, ads.facebook.com, pixel.facebook.com, *.facebook.com, *.instagram.com
