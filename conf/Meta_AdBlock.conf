# Instagram + Facebook 去广告（合并版）- Quantumult X
# raw: https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Meta_AdBlock.conf
#
# 也可分别引用:
# https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Instagram_AdBlock.conf
# https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Facebook_AdBlock.conf

[rewrite_local]
# ========== Instagram ==========
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/timeline\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/reels_tray\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/user\/\d+\/story\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/reels_media\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/discover\/(topical_explore|explore_grid|ayml)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/clips\/(discover|home|stream|items)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/feed\/mixed_reels\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/api\/v1\/(ads|advertising|ad_|loom_fetch|graph_ad) url reject-dict
^https?:\/\/(www\.)?instagram\.com\/(graphql\/query|api\/graphql) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(i|b)\.instagram\.com\/graphql(_www)? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# ========== Facebook ==========
^https?:\/\/(graph|b-graph|gateway)\.facebook\.com\/(graphql|v\d+\.\d+\/graphql) url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www\.)?facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/web\.facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/an\.facebook\.com\/ url reject-dict
^https?:\/\/ads\.(facebook|meta)\.com\/ url reject-dict
^https?:\/\/(www\.)?facebook\.com\/tr\/?\? url reject-200
^https?:\/\/pixel\.(facebook|meta)\.com\/ url reject-200
^https?:\/\/graph\.facebook\.com\/network_ads_common\/ url reject-dict
^https?:\/\/atdmt\.com\/ url reject-dict

[mitm]
hostname = i.instagram.com, b.instagram.com, graph.instagram.com, www.instagram.com, instagram.com, graph.facebook.com, b-graph.facebook.com, gateway.facebook.com, www.facebook.com, web.facebook.com, facebook.com, an.facebook.com, ads.facebook.com, pixel.facebook.com, m.facebook.com
