# Meta 兼容模式（推荐｜解决红锁/0B/打不开）
# https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/conf/Meta_AdBlock_Compat.conf
#
# 说明:
# 官方 Instagram / Facebook App 启用了 SSL Pinning（证书锁定）。
# 对 gateway/i/graph 等域名做 MITM 会出现：红锁、N/A、0B、内容空白。
# 此配置 **不对 App API 域名做 HTTPS 解密**，只拦部分追踪域名，并给 Safari 网页版去广告。
#
# App 内信息流「赞助」在未过证书锁定前，任何 rewrite 脚本都无法修改。

[rewrite_local]
# —— 仅拦截独立广告/追踪域名（不影响主站 API）——
^https?:\/\/an\.facebook\.com\/ url reject-dict
^https?:\/\/ads\.(facebook|meta)\.com\/ url reject-dict
^https?:\/\/pixel\.(facebook|meta)\.com\/ url reject-200
^https?:\/\/(www\.)?facebook\.com\/tr\/?\? url reject-200
^https?:\/\/atdmt\.com\/ url reject-dict
^https?:\/\/.*\.facebookma\.cn\/ url reject-dict

# —— Safari / 网页版 Instagram（无 pinning，可改包）——
^https?:\/\/(www\.)?instagram\.com\/(graphql\/query|api\/graphql)\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js
^https?:\/\/(www\.)?instagram\.com\/api\/v1\/(feed|discover|clips)\/ url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Instagram_AdBlock.js

# —— Safari / 网页版 Facebook ——
^https?:\/\/(www|web|m|mbasic)\.facebook\.com\/api\/graphql\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js
^https?:\/\/(www|web|m)\.facebook\.com\/api\/graphqlbatch\/? url script-response-body https://raw.githubusercontent.com/carlleilzj/Meta_AdBlock_QX/main/scripts/Facebook_AdBlock.js

[mitm]
# 注意：不要加入 i.instagram.com / gateway.facebook.com / graph.facebook.com 等 App API
# 那些域名有证书锁定，MITM 只会红锁并导致 App 空白
hostname = www.instagram.com, instagram.com, www.facebook.com, web.facebook.com, m.facebook.com, mbasic.facebook.com, an.facebook.com, ads.facebook.com, pixel.facebook.com
